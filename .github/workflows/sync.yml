name: Sync Tax Office Dataset

on:
  repository_dispatch:
    types: [update-tax-data]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout data repo
        uses: actions/checkout@v4

      - name: Download latest dataset from scraper repo
        env:
          SCRAPER_REPO_TOKEN: ${{ secrets.SCRAPER_REPO_TOKEN }}
        run: |
          curl -sS -L \
            -H "Authorization: Bearer ${SCRAPER_REPO_TOKEN}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://raw.githubusercontent.com/${{ github.repository_owner }}/gib-tax-office-scraper/main/dist/tax-offices-tr.json" \
            -o tax-offices-tr.json

      - name: Validate JSON
        run: |
          node -e "
            const d = JSON.parse(require('fs').readFileSync('tax-offices-tr.json','utf8'));
            if (!Array.isArray(d.data) || d.data.length === 0) throw new Error('Empty or malformed dataset');
            console.log('Valid. Entries:', d.data.length);
          "

      - name: Check for changes
        id: diff
        run: |
          git diff --exit-code tax-offices-tr.json \
            && echo "changed=false" >> "$GITHUB_OUTPUT" \
            || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Bump version and commit
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tax-offices-tr.json
          npm version patch --no-git-tag-version
          git add package.json
          git commit -m "chore: sync tax office dataset $(date -u +%Y-%m-%d)"
          git push

      - name: Create release tag
        if: steps.diff.outputs.changed == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Publish to npm
        if: steps.diff.outputs.changed == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
          npm publish --access public
